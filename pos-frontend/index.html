<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1114" />
    <meta name="description" content="Restro is the modern restaurant POS for faster orders, live kitchen operations, inventory, payments, staff, and QR menus. Free forever plan available." />

    <!-- Favicons — all major platforms -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <meta name="msapplication-TileImage" content="/favicon.png" />
    <meta name="msapplication-TileColor" content="#0b1114" />

    <!-- Open Graph / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://restro.in" />
    <meta property="og:title" content="Restro — Restaurant operations, in one place" />
    <meta property="og:description" content="Run orders, tables, kitchen, payments, inventory, and staff from one modern restaurant platform. Free forever plan." />
    <meta property="og:image" content="https://restro.in/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Restro" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Restro — Restaurant POS & Operations" />
    <meta name="twitter:description" content="Run your restaurant without the chaos. Orders, kitchen, payments, inventory — one screen." />
    <meta name="twitter:image" content="https://restro.in/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://restro.in" />

    <title>Restro | Modern Restaurant POS &amp; Operations — Free Forever Plan</title>

    <!-- Rich structured data: SoftwareApplication with pricing + rating -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Restro",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "url": "https://restro.in",
        "description": "A modern restaurant POS and operations platform for orders, tables, kitchen, payments, inventory, staff, and QR menus.",
        "offers": [
          {
            "@type": "Offer",
            "name": "Starter",
            "price": "0",
            "priceCurrency": "INR",
            "description": "Free forever — up to 300 orders/month, 30 menu items, 10 tables, 3 staff"
          },
          {
            "@type": "Offer",
            "name": "Professional",
            "price": "2499",
            "priceCurrency": "INR",
            "billingIncrement": "P1M",
            "description": "Unlimited orders, inventory, QR menus, 10 staff, 90-day analytics, CSV export"
          }
        ],
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "reviewCount": "47",
          "bestRating": "5"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
