<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1114" />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("restro-public-theme");
          const theme =
            saved === "light" || saved === "dark"
              ? saved
              : matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.marketingTheme = theme;
          document.documentElement.style.colorScheme = theme;
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute("content", theme === "dark" ? "#0e1512" : "#f4f2ec");
        } catch {
          document.documentElement.dataset.marketingTheme = "light";
        }
      })();
    </script>
    <meta name="description" content="Restro is the modern restaurant POS for faster orders, live kitchen operations, inventory, payments, staff, and QR menus. Free forever plan available." />
    <meta name="robots" content="__SEO_ROBOTS__" />

    <!-- Favicons — all major platforms -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <meta name="msapplication-TileImage" content="/favicon.png" />
    <meta name="msapplication-TileColor" content="#0b1114" />

    <!-- Open Graph / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta data-seo-absolute property="og:url" content="__PUBLIC_SITE_URL__/" />
    <meta property="og:title" content="Restro — Restaurant operations, in one place" />
    <meta property="og:description" content="Run orders, tables, kitchen, payments, inventory, and staff from one modern restaurant platform. Free forever plan." />
    <meta data-seo-absolute property="og:image" content="__PUBLIC_SITE_URL__/favicon.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="1024" />

    <!-- Canonical -->
