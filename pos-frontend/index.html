    <meta name="theme-color" content="#0b1114" />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("restro-public-theme");
          const theme =
            saved === "light" || saved === "dark"
              ? saved
              : matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.marketingTheme = theme;
          document.documentElement.style.colorScheme = theme;
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute("content", theme === "dark" ? "#0e1512" : "#f4f2ec");
        } catch {
          document.documentElement.dataset.marketingTheme = "light";
        }
      })();
    </script>
